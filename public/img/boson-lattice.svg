<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <style>
      :root{ --ring:#7fc3ff; --core:#9ad6ff; --op:.08; }
    </style>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--core)" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="var(--ring)" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="var(--ring)" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="none"/>
  <!-- inner glow -->
  <circle cx="512" cy="512" r="200" fill="url(#core)"/>
  <!-- double inner ring strokes -->
  <g stroke="var(--ring)" stroke-opacity="0.22" fill="none">
    <circle cx="512" cy="512" r="215" stroke-width="2"/>
    <circle cx="512" cy="512" r="245" stroke-width="1.2"/>
  </g>
  <!-- lattice: 48 cells per ring, 7 rings, concentric scaling -->
  <g transform="translate(512 512)" fill="var(--ring)" fill-opacity="var(--op)">
    <g id="cells48">
      <!-- 48 = 360 / 7.5 -->
      <rect x="-7" y="-280" width="14" height="14" rx="2"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(7.5)"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(15)"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(22.5)"/>
