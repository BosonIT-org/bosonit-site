    <g transform="scale(1.0)"><use href="#cells48"/></g>
    <g transform="scale(1.18)"><use href="#cells48"/></g>
    <g transform="scale(1.36)"><use href="#cells48"/></g>
    <g transform="scale(1.54)"><use href="#cells48"/></g>
    <g transform="scale(1.72)"><use href="#cells48"/></g>
    <g transform="scale(1.90)"><use href="#cells48"/></g>
  </g>
