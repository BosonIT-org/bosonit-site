      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(52.5)"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(60)"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(67.5)"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(75)"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(82.5)"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(90)"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(97.5)"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(105)"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(112.5)"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(120)"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(127.5)"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(135)"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(142.5)"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(150)"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(157.5)"/>
      <rect x="-7" y="-280" width="14" height="14" rx="2" transform="rotate(165)"/>
