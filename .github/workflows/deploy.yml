name: Deploy Site
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      STACK_USER: ${{ vars.STACK_USER }}
      VPS0_HOST: ${{ vars.VPS0_HOST }}
      VPS0_USER: ${{ vars.VPS0_USER }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 18

    - run: npm ci
    - run: npm run build

    - name: Install SSH keys
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        : > ~/.ssh/config

        safe_keyscan() {
          local host="$1"
          if ssh-keyscan -T 5 "$host" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "Loaded host key for ${host}"
          else
            echo "Warning: unable to fetch host key for ${host}; continuing." >&2
          fi
        }

        if [ -n "${{ secrets.STACKCP_KEY }}" ]; then
          echo "${{ secrets.STACKCP_KEY }}" > ~/.ssh/id_stackcp
          chmod 600 ~/.ssh/id_stackcp
          safe_keyscan ssh.us.stackcp.com
        fi

        if [ -n "${{ secrets.VPS0_SSH_KEY }}" ]; then
          echo "${{ secrets.VPS0_SSH_KEY }}" > ~/.ssh/id_vps0
          chmod 600 ~/.ssh/id_vps0
        fi

        if [ -n "${STACK_USER}" ] && [ -s ~/.ssh/id_stackcp ]; then
          cat >> ~/.ssh/config <<EOF
        Host stackcp
          HostName ssh.us.stackcp.com
          User ${STACK_USER}
          IdentityFile ~/.ssh/id_stackcp
          IdentitiesOnly yes
        EOF
        fi

        if [ -n "${VPS0_HOST}" ] && [ -n "${VPS0_USER}" ] && [ -s ~/.ssh/id_vps0 ]; then
          safe_keyscan "${VPS0_HOST}"
          cat >> ~/.ssh/config <<EOF
        Host vps0
          HostName ${VPS0_HOST}
          User ${VPS0_USER}
          IdentityFile ~/.ssh/id_vps0
          IdentitiesOnly yes
        EOF
        fi
        chmod 600 ~/.ssh/config

    - name: Deploy to Live Origin (vps0)
      run: |
        if [ -z "${VPS0_HOST}" ] || [ -z "${VPS0_USER}" ] || [ ! -s ~/.ssh/id_vps0 ]; then
          echo "VPS0 deploy skipped: host/user/key missing."
          exit 0
        fi

        ssh vps0 "sudo mkdir -p /var/www/bosonit"
        rsync -avz \
          --rsync-path="sudo rsync" \
          --chmod=Du=rwx,Dg=rx,Do=rx,Fu=rw,Fg=r,Fo=r \
          dist/ "vps0:/var/www/bosonit/"

    - name: Mirror to StackCP
      run: |
        if [ -z "${STACK_USER}" ] || [ ! -s ~/.ssh/id_stackcp ]; then
          echo "StackCP mirror skipped: user/key missing."
          exit 0
        fi

        rsync -avz --delete \
          --chmod=Du=rwx,Dg=rx,Do=rx,Fu=rw,Fg=r,Fo=r \
          dist/ "stackcp:~/public_html/bosonit.org/"

    - name: Verify public routes
      run: |
        set -euo pipefail
        deadline=$((SECONDS + 180))
        ok=0
        while [ $SECONDS -lt $deadline ]; do
          nonce="$(date +%s)-$RANDOM"
          html="$(curl -fsS \
            -H "Cache-Control: no-cache, no-store" \
            -H "Pragma: no-cache" \
            "https://www.bosonit.org/services/?cb=${nonce}" || true)"
          json="$(curl -fsS \
            -H "Cache-Control: no-cache, no-store" \
            -H "Pragma: no-cache" \
            "https://www.bosonit.org/observatory/control-plane.latest.json?cb=${nonce}" || true)"
          if echo "$html" | grep -q "Revenue Leak Audit" && echo "$json" | grep -q "\"schema_version\""; then
            ok=1
            break
          fi
          sleep 5
        done
        if [ "$ok" -ne 1 ]; then
          echo "Public route verification failed: expected services and observatory payload not served."
          echo "services sample:"
          echo "$html" | head -c 300 || true
          echo
          echo "observatory sample:"
          echo "$json" | head -c 300 || true
          echo
          exit 1
        fi
