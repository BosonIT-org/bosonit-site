name: Deploy Site
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      STACK_USER: ${{ vars.STACK_USER }}
      VPS0_HOST: ${{ vars.VPS0_HOST }}
      VPS0_USER: ${{ vars.VPS0_USER }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 18

    - run: npm ci
    - run: npm run build

    - name: Install SSH keys
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        : > ~/.ssh/config

        safe_keyscan() {
          local host="$1"
          if ssh-keyscan -T 5 "$host" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "Loaded host key for ${host}"
          else
            echo "Warning: unable to fetch host key for ${host}; continuing." >&2
          fi
        }

        if [ -n "${{ secrets.STACKCP_KEY }}" ]; then
          echo "${{ secrets.STACKCP_KEY }}" > ~/.ssh/id_stackcp
          chmod 600 ~/.ssh/id_stackcp
          safe_keyscan ssh.us.stackcp.com
        fi

        if [ -n "${{ secrets.VPS0_SSH_KEY }}" ]; then
          echo "${{ secrets.VPS0_SSH_KEY }}" > ~/.ssh/id_vps0
          chmod 600 ~/.ssh/id_vps0
        fi

        if [ -n "${STACK_USER}" ] && [ -s ~/.ssh/id_stackcp ]; then
          cat >> ~/.ssh/config <<EOF
        Host stackcp
          HostName ssh.us.stackcp.com
          User ${STACK_USER}
          IdentityFile ~/.ssh/id_stackcp
          IdentitiesOnly yes
        EOF
        fi

        if [ -n "${VPS0_HOST}" ] && [ -n "${VPS0_USER}" ] && [ -s ~/.ssh/id_vps0 ]; then
          safe_keyscan "${VPS0_HOST}"
          cat >> ~/.ssh/config <<EOF
        Host vps0
          HostName ${VPS0_HOST}
          User ${VPS0_USER}
          IdentityFile ~/.ssh/id_vps0
          IdentitiesOnly yes
        EOF
        fi
        chmod 600 ~/.ssh/config

    - name: Deploy to Live Origin (vps0)
      run: |
        if [ -z "${VPS0_HOST}" ] || [ -z "${VPS0_USER}" ] || [ ! -s ~/.ssh/id_vps0 ]; then
          echo "VPS0 deploy skipped: host/user/key missing."
          exit 0
        fi

        ssh vps0 "sudo mkdir -p /var/www/bosonit"
        rsync -avz \
          --rsync-path="sudo rsync" \
          --chmod=Du=rwx,Dg=rx,Do=rx,Fu=rw,Fg=r,Fo=r \
          dist/ "vps0:/var/www/bosonit/"

    - name: Mirror to StackCP
      run: |
        if [ -z "${STACK_USER}" ] || [ ! -s ~/.ssh/id_stackcp ]; then
          echo "StackCP mirror skipped: user/key missing."
          exit 0
        fi

        rsync -avz --delete \
          --chmod=Du=rwx,Dg=rx,Do=rx,Fu=rw,Fg=r,Fo=r \
          dist/ "stackcp:~/public_html/bosonit.org/"

    - name: Verify deployed routes
      run: |
        set -euo pipefail
        if [ -z "${VPS0_HOST}" ] || [ -z "${VPS0_USER}" ] || [ ! -s ~/.ssh/id_vps0 ]; then
          echo "Origin verification failed: VPS0 host/user/key missing."
          exit 1
        fi

        ssh vps0 'grep -q "Revenue Leak Audit" /var/www/bosonit/services/index.html'
        ssh vps0 'grep -q "\"schema_version\"" /var/www/bosonit/observatory/control-plane.latest.json'
        echo "Origin verification passed on vps0."

        nonce="$(date +%s)-$RANDOM"
        services_status="$(curl -sS -o /tmp/services-response.html -w '%{http_code}' "https://www.bosonit.org/services/?cb=${nonce}" || true)"
        observatory_status="$(curl -sS -o /tmp/observatory-response.json -w '%{http_code}' "https://www.bosonit.org/observatory/control-plane.latest.json?cb=${nonce}" || true)"
        services_status="${services_status:-000}"
        observatory_status="${observatory_status:-000}"

        if [ "$services_status" = "200" ] && [ "$observatory_status" = "200" ]; then
          grep -q "Revenue Leak Audit" /tmp/services-response.html
          grep -q "\"schema_version\"" /tmp/observatory-response.json
          echo "Public edge verification passed."
          exit 0
        fi

        if [ "$services_status" = "403" ] || [ "$observatory_status" = "403" ]; then
          echo "Public edge verification returned 403 (likely WAF from GitHub runner); treated as non-blocking."
          exit 0
        fi

        echo "Public edge verification failed with statuses services=${services_status} observatory=${observatory_status}."
        exit 1
