name: Publish Observatory Evidence

on:
  workflow_run:
    workflows:
      - Habitat Warden
      - Habitat Warden Docker
      - Deploy Site
      - Deploy to StackCP
      - StackCP Sites
      - StackCP Previews
    types:
      - completed

permissions:
  contents: read
  actions: read

concurrency:
  group: observatory-publish-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.workflow_run.conclusion != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Check observatory push token
        id: token
        env:
          OBS_TOKEN: ${{ secrets.OBSERVATORY_PUSH_TOKEN }}
        run: |
          if [ -z "$OBS_TOKEN" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::OBSERVATORY_PUSH_TOKEN is not configured; skipping publish."
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download run artifacts
        if: steps.token.outputs.has_token == 'true'
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: /tmp/source-artifacts
          merge-multiple: false

      - name: Publish artifacts to observatory repo
        if: steps.token.outputs.has_token == 'true'
        id: publish
        env:
          OBS_TOKEN: ${{ secrets.OBSERVATORY_PUSH_TOKEN }}
          GH_TOKEN: ${{ secrets.OBSERVATORY_PUSH_TOKEN }}
          OBS_REPO: BosonIT-org/bosonit-habitat-observatory
          OBS_BASE_BRANCH: main
          SRC_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_HTML_URL: ${{ github.event.workflow_run.html_url }}
        shell: bash
        run: |
          set -euo pipefail

          SANITIZED_WORKFLOW="$(printf '%s' "$WORKFLOW_NAME" | tr '[:upper:]' '[:lower:]' | tr ' /:' '---' | tr -cd 'a-z0-9._-')"
          TARGET_ROOT="evidence/${SRC_REPO}/${SANITIZED_WORKFLOW}/run-${RUN_ID}-attempt-${RUN_ATTEMPT}"

          git clone "https://x-access-token:${OBS_TOKEN}@github.com/${OBS_REPO}.git" /tmp/observatory
          mkdir -p "/tmp/observatory/${TARGET_ROOT}"

          if [ -d /tmp/source-artifacts ]; then
            cp -R /tmp/source-artifacts/. "/tmp/observatory/${TARGET_ROOT}/"
          fi

          cat > "/tmp/observatory/${TARGET_ROOT}/metadata.json" <<JSON
          {
            "source_repository": "${SRC_REPO}",
            "workflow_name": "${WORKFLOW_NAME}",
            "workflow_run_id": ${RUN_ID},
            "workflow_run_attempt": ${RUN_ATTEMPT},
            "conclusion": "${RUN_CONCLUSION}",
            "workflow_url": "${WORKFLOW_HTML_URL}",
            "published_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

          cd /tmp/observatory
          git config user.name "bosonit-observatory-bot"
          git config user.email "automation@bosonit.org"
          git add "${TARGET_ROOT}"

          if git diff --cached --quiet; then
            echo "No evidence delta to commit."
            echo "result=no-change" >> "$GITHUB_OUTPUT"
            echo "auto_merge=not-applicable" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH_NAME="automation/observatory-evidence/run-${RUN_ID}-attempt-${RUN_ATTEMPT}"
          PR_TITLE="evidence: ${SRC_REPO} ${WORKFLOW_NAME} run ${RUN_ID}/${RUN_ATTEMPT}"
          export BRANCH_NAME PR_TITLE

          git commit -m "${PR_TITLE}"
          git checkout -B "${BRANCH_NAME}"
          git push -u origin "${BRANCH_NAME}"

          OBS_OWNER="${OBS_REPO%%/*}"
          HEAD_REF="${OBS_OWNER}:${BRANCH_NAME}"
          API_ROOT="https://api.github.com/repos/${OBS_REPO}"
          ENCODED_HEAD_REF="$(python3 -c 'import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=""))' "${HEAD_REF}")"

          existing_pr="$(curl -fsS \
            -H "Authorization: token ${OBS_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API_ROOT}/pulls?state=open&head=${ENCODED_HEAD_REF}" \
            | python3 -c 'import json,sys; data=json.load(sys.stdin); print(data[0]["html_url"] if data else "")')"

          if [ -n "${existing_pr}" ]; then
            echo "Open PR already exists: ${existing_pr}"
            publish_result="pr-reused"
            pr_url="${existing_pr}"
          else
            python3 -c 'import json, os; print(json.dumps({"title": os.environ["PR_TITLE"], "head": os.environ["BRANCH_NAME"], "base": os.environ["OBS_BASE_BRANCH"], "body": f"Automated observatory evidence publication from {os.environ[\"SRC_REPO\"]}\\n\\n- Workflow: {os.environ[\"WORKFLOW_NAME\"]}\\n- Run: {os.environ[\"WORKFLOW_HTML_URL\"]}\\n- Conclusion: {os.environ[\"RUN_CONCLUSION\"]}"}))' > /tmp/observatory-pr-payload.json

            create_status="$(curl -sS -o /tmp/observatory-pr-response.json -w '%{http_code}' -X POST \
              -H "Authorization: token ${OBS_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${API_ROOT}/pulls" \
              --data @/tmp/observatory-pr-payload.json)"

            if [ "${create_status}" != "201" ]; then
              echo "Failed to create observatory PR (status ${create_status})."
              cat /tmp/observatory-pr-response.json
              exit 1
            fi

            pr_url="$(python3 -c 'import json; print(json.load(open("/tmp/observatory-pr-response.json", "r", encoding="utf-8"))["html_url"])')"
            echo "Opened PR: ${pr_url}"
            publish_result="pr-opened"
          fi

          if gh pr merge "${pr_url}" --repo "${OBS_REPO}" --auto --squash --delete-branch; then
            auto_merge_status="enabled"
          else
            echo "::warning::Unable to enable auto-merge for ${pr_url}; manual merge may be required."
            auto_merge_status="failed"
          fi

          echo "result=${publish_result}" >> "$GITHUB_OUTPUT"
          echo "pr_url=${pr_url}" >> "$GITHUB_OUTPUT"
          echo "auto_merge=${auto_merge_status}" >> "$GITHUB_OUTPUT"

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Observatory Publish"
            echo "- Source repo: \`${{ github.repository }}\`"
            echo "- Workflow: \`${{ github.event.workflow_run.name }}\`"
            echo "- Run ID: \`${{ github.event.workflow_run.id }}\`"
            echo "- Conclusion: \`${{ github.event.workflow_run.conclusion }}\`"
            echo "- Token configured: \`${{ steps.token.outputs.has_token || 'false' }}\`"
            echo "- Publish result: \`${{ steps.publish.outputs.result || 'not-run' }}\`"
            echo "- Auto-merge: \`${{ steps.publish.outputs.auto_merge || 'not-run' }}\`"
            echo "- Observatory PR: \`${{ steps.publish.outputs.pr_url || 'n/a' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
